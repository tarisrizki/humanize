name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install uv
      run: pip install uv
      
    - name: Install dependencies
      working-directory: ./humanwrite-backend
      run: uv pip install --system -r pyproject.toml
      
    - name: Lint with Ruff
      working-directory: ./humanwrite-backend
      run: |
        uv pip install --system ruff
        ruff check .
        
    - name: Run Tests
      working-directory: ./humanwrite-backend
      run: |
        # Download minimal spacy model for tests
        python -m spacy download en_core_web_sm
        # Note: Stanza model download might take a while, skipped or mocked in tests if needed
        pytest tests/
